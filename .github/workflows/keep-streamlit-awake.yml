name: Keep Streamlit app awake

on:
  schedule:
    # Every 6 hours, at :17 to dodge the top-of-hour GitHub Actions queue spike.
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping cvu-rtl.streamlit.app
        run: |
          curl --fail-with-body \
               --location \
               --retry 5 \
               --retry-all-errors \
               --retry-delay 10 \
               --max-time 60 \
               --user-agent "github-actions-keepalive" \
               -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
               https://cvu-rtl.streamlit.app
